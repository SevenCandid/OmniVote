version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/workspace/api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:securepassword@db:5432/omnivote
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.frontend
    volumes:
      - ./apps/web:/workspace/web
    ports:
      - "3000:3000"
    depends_on:
      - api

  celery_worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.backend
    command: celery -A app.core.celery worker --loglevel=info
    volumes:
      - ./apps/api:/workspace/api
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:securepassword@db:5432/omnivote
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=securepassword
      - POSTGRES_DB=omnivote
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  storage:
    image: minio/minio:RELEASE.2023-01-25T00-19-54Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - miniadata:/data

volumes:
  pgdata:
  miniadata:
