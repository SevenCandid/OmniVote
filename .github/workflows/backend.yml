name: Backend CI

on:
  workflow_call:
  push:
    branches: [ main ]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'apps/api/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Ruff format
        run: ruff format --check .

      - name: Verify Ruff linting rules
        run: ruff check .

      - name: Run Pytest & Coverage
        run: pytest

      - name: Upload Backend Coverage (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: apps/api/htmlcov/
          retention-days: 7

      - name: Upload Backend Coverage (XML)
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: apps/api/coverage.xml
          retention-days: 7
